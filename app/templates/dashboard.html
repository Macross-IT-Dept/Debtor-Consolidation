{% extends 'base.html' %}

{% block title %} Dashboard {% endblock %}

{% block content %}

<style>

table thead tr#filterRow th {
    padding: 4px;
    background-color: #f8f9fa;
    border-bottom: 1px solid #dee2e6;
}

table thead tr#filterRow th input {
    width: 100% !important;
    padding: 3px;
    border: 1px solid #ced4da;
    border-radius: 4px;
    font-size: 0.9em;
    box-sizing: border-box;
}

#spinner:not([hidden]) {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

#spinner::after {
  content: "";
  width: 80px;
  height: 80px;
  border: 2px solid #f3f3f3;
  border-top: 3px solid #f25a41;
  border-radius: 100%;
  will-change: transform;
  animation: spin 1s infinite linear
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

</style>
<div class="row my-3 g-3">
    <div class="col-lg-4 col-md-4 col-12">
        <div class="card h-100">
            <div class="card-header"><h3><b>Client Groups</b></h3></div>
            <div class="card-body">
                <div class="card-body">
                    <table id="ContactGroupTable" class="table table-hover table-striped table-bordered" style="width:100%">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Organization</th>
                                <th>Contact Group Name</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-8 col-md-8 col-12">
        <div class="card h-100">
            <div class="card-header">
                <h3><b>Client List</b></h3>
            </div>
            <div class="card-body">
                <table id="ContactTable" class="table table-hover table-striped table-bordered" style="width:100%">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Contact Name</th>
                            <th>Organization</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div hidden id="spinner"></div>

{% endblock %}

                    var $th = $('<th>')
                        .addClass('filter-cell')
                        .css('min-width', column.header().style.minWidth);

                        // Checkbox column (no filter)
                        $th.html('&nbsp;');
                    } else {
                        $th.html('<input type="text" placeholder="Search '+$(column.header()).text()+'" />');
                    }
                    
                    $filterRow.append($th);
                });
